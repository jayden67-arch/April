<!DOCTYPE html>
<html>
<head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

h1 {
    font-size: 56px;
    color: white;
    margin-bottom: 20px;
    animation: fadeIn 0.8s ease-in, bounce 1s ease-in-out 0.3s;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

h2 {
    font-size: 28px;
    color: white;
    margin-bottom: 30px;
    animation: fadeIn 0.8s ease-in 0.2s both;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

a{
    margin-top:20px;
    font-size:18px;
    color: white;
    text-decoration:none;
    cursor:pointer;
    padding: 12px 24px;
    border: 2px solid white;
    border-radius: 30px;
    transition: all 0.3s ease;
    display: inline-block;
    animation: fadeIn 0.8s ease-in 0.4s both;
}

a:hover{
    background: white;
    color: #764ba2;
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-20px);
    }
}
</style>
</head>
<body>

<h1>❤️ Yay!! ❤️</h1>
<h2>I knew you'd say yes! 😊</h2>
<a href="letter.html">Go back</a>

</body>
</html>
